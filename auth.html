<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="NetMap">
    <meta name="copyright" content="Copyright (c) 2024-2026 NetMap. All Rights Reserved.">
    <title>Вход — Карта локальной сети</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="auth.css">
    <!-- Защита от копирования -->
    <script>
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) || (e.ctrlKey && (e.key === 'U' || e.key === 'u'))) {
                e.preventDefault(); return false;
            }
        });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
    </script>
    <style>
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        input, textarea { -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; }
    </style>
</head>
<body>
    <!-- Plexus / AI-style фон: узлы и связи -->
    <div class="auth-bg" aria-hidden="true">
        <div class="auth-bg-gradient"></div>
        <canvas id="authPlexusCanvas" class="auth-bg-plexus"></canvas>
    </div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                </div>
                <h1>Карта сети</h1>
                <p class="auth-subtitle">Система управления сетевой инфраструктурой</p>
            </div>

            <!-- Форма входа -->
            <form id="loginForm" class="auth-form active">
                <h2>Вход в систему</h2>
                
                <div class="form-group">
                    <label for="loginUsername">Имя пользователя</label>
                    <div class="input-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="loginUsername" placeholder="Введите имя пользователя" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Пароль</label>
                    <div class="input-wrapper has-toggle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="loginPassword" placeholder="Введите пароль" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group form-group-inline">
                    <label class="checkbox-label">
                        <input type="checkbox" id="loginRememberMe" checked>
                        <span>Запомнить меня (сброс через месяц)</span>
                    </label>
                </div>

                <button type="submit" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                    Войти
                </button>

                <div class="auth-footer">
                    <p>Нет аккаунта? <a href="#" onclick="switchForm('register')">Зарегистрироваться</a></p>
                    <p class="auth-license">© 2024–2026 NetMap. Проприетарное ПО. Все права защищены.</p>
                </div>
            </form>

            <!-- Форма регистрации -->
            <form id="registerForm" class="auth-form">
                <h2>Регистрация</h2>
                
                <div class="form-group">
                    <label for="regUsername">Имя пользователя</label>
                    <div class="input-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="regUsername" placeholder="Придумайте имя пользователя" required minlength="3">
                    </div>
                </div>

                <div class="form-group">
                    <label for="regFullName">Полное имя</label>
                    <div class="input-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="regFullName" placeholder="Введите ваше имя" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="regPassword">Пароль</label>
                    <div class="input-wrapper has-toggle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="regPassword" placeholder="Придумайте пароль" required minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <small class="hint">Минимум 6 символов</small>
                </div>

                <div class="form-group">
                    <label for="regPasswordConfirm">Подтвердите пароль</label>
                    <div class="input-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="8.5" cy="7" r="4"></circle>
                        <line x1="20" y1="8" x2="20" y2="14"></line>
                        <line x1="23" y1="11" x2="17" y2="11"></line>
                    </svg>
                    Зарегистрироваться
                </button>

                <div class="auth-footer">
                    <p>Уже есть аккаунт? <a href="#" onclick="switchForm('login')">Войти</a></p>
                    <p class="auth-license">© 2024–2026 NetMap. Проприетарное ПО. Все права защищены.</p>
                </div>
            </form>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="auth.js"></script>
    <script>
    (function() {
        var canvas = document.getElementById('authPlexusCanvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var nodes = [];
        var nodeCount = 70;
        var maxDist = 160;
        var lineOpacity = 0.12;
        var nodeRadius = 1.5;
        var hue = 217;
        var resize = function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (nodes.length === 0) {
                for (var i = 0; i < nodeCount; i++) {
                    nodes.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.15,
                        vy: (Math.random() - 0.5) * 0.15
                    });
                }
            }
        };
        var draw = function() {
            if (!ctx || !canvas.width || !canvas.height) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            var i, j, dx, dy, d, op;
            for (i = 0; i < nodes.length; i++) {
                for (j = i + 1; j < nodes.length; j++) {
                    dx = nodes[j].x - nodes[i].x;
                    dy = nodes[j].y - nodes[i].y;
                    d = Math.sqrt(dx * dx + dy * dy);
                    if (d < maxDist) {
                        op = (1 - d / maxDist) * lineOpacity;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.strokeStyle = 'rgba(59, 130, 246, ' + op + ')';
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            for (i = 0; i < nodes.length; i++) {
                var n = nodes[i];
                var g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, nodeRadius * 4);
                g.addColorStop(0, 'rgba(147, 197, 253, 0.9)');
                g.addColorStop(0.4, 'rgba(59, 130, 246, 0.4)');
                g.addColorStop(1, 'rgba(59, 130, 246, 0)');
                ctx.beginPath();
                ctx.arc(n.x, n.y, nodeRadius * 4, 0, Math.PI * 2);
                ctx.fillStyle = g;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(n.x, n.y, nodeRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.fill();
            }
        };
        var tick = function() {
            var i, n;
            for (i = 0; i < nodes.length; i++) {
                n = nodes[i];
                n.x += n.vx;
                n.y += n.vy;
                if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
                if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
                n.x = Math.max(0, Math.min(canvas.width, n.x));
                n.y = Math.max(0, Math.min(canvas.height, n.y));
            }
            draw();
            requestAnimationFrame(tick);
        };
        resize();
        window.addEventListener('resize', function() {
            resize();
            draw();
        });
        tick();
    })();
    </script>
</body>
</html>
